<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - DarkSensi</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: #121212; color: #fff; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .painel {
            background: #1a1a1a; border-radius: 16px; padding: 30px; width: 100%; max-width: 450px;
            border: 2px solid #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }
        h1 { color: #ffd700; text-align: center; margin-bottom: 25px; font-size: 28px; }
        .grupo { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 16px; color: #ccc; }
        input {
            width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #333;
            background: #000; color: #fff; font-size: 16px; outline: none;
        }
        .botoes { display: flex; gap: 12px; margin-top: 10px; }
        button {
            flex: 1; padding: 14px; border-radius: 8px; border: none; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-ativar { background: #10b981; color: white; }
        .btn-ativar:hover { background: #059669; transform: translateY(-2px); }
        .btn-desativar { background: #ef4444; color: white; }
        .btn-desativar:hover { background: #dc2626; transform: translateY(-2px); }
        .status {
            margin-top: 25px; padding: 15px; border-radius: 8px; text-align: center;
            font-weight: 600; font-size: 18px;
        }
        .status.ativado { background: rgba(16,185,129,0.1); border: 1px solid #10b981; color: #10b981; }
        .status.desativado { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #ef4444; }
        .aviso { text-align: center; margin-top: 15px; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="painel">
        <h1>⚙️ Painel Administrativo</h1>

        <div class="grupo">
            <label>🔑 Senha de Acesso</label>
            <input type="password" id="senhaAdm" placeholder="Digite sua senha">
        </div>

        <div class="grupo">
            <label>👤 Nome do Administrador</label>
            <input type="text" id="nomeAdm" value="Darkzin ADM">
        </div>

        <div class="botoes">
            <button class="btn-ativar" onclick="ativarSite()">✅ Ativar Site</button>
            <button class="btn-desativar" onclick="desativarSite()">❌ Desativar Site</button>
        </div>

        <div class="status" id="statusSite">Carregando status...</div>
        <p class="aviso">Apenas você controla tudo 🖤</p>
    </div>

    <script>
        // ==============================
        // ✅ COLE SUAS CHAVES DO FIREBASE AQUI
        // ==============================
        const firebaseConfig = {

  apiKey: "AIzaSyBPEqoSTF3ZYDyiDy16-qqSyy_vEg19Qno",

  authDomain: "sensibilidade-freefire-6d791.firebaseapp.com",

  projectId: "sensibilidade-freefire-6d791",

  storageBucket: "sensibilidade-freefire-6d791.firebasestorage.app",

  messagingSenderId: "269911148530",

  appId: "1:269911148530:web:80a1097c0cff5537e8cd6b",

  measurementId: "G-ZXZN8LTLDS"

};

        // ✅ SUA SENHA DE ADMINISTRADOR (ALTERE QUANDO QUISER)
        const SENHA_CORRETA = "darkzin123";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const refConfig = db.collection('configuracoes').doc('geral');

        async function carregarStatus() {
            const doc = await refConfig.get();
            if(doc.exists) {
                const dados = doc.data();
                atualizarTela(dados.ativo, dados.nomeAdm);
                document.getElementById('nomeAdm').value = dados.nomeAdm || 'Darkzin ADM';
            } else {
                atualizarTela(false, 'Darkzin ADM');
            }
        }

        function atualizarTela(ativo, nome) {
            const el = document.getElementById('statusSite');
            if(ativo) {
                el.className = 'status ativado';
                el.innerHTML = `✅ SITE ATIVADO<br>Administrador: ${nome}`;
            } else {
                el.className = 'status desativado';
                el.innerHTML = `❌ SITE DESATIVADO<br>Em breve online novamente`;
            }
        }

        async function ativarSite() {
            if(!verificarSenha()) return;
            const nome = document.getElementById('nomeAdm').value.trim() || 'Darkzin ADM';
            await refConfig.set({ ativo: true, nomeAdm: nome, ultimaAlteracao: firebase.firestore.FieldValue.serverTimestamp() });
            atualizarTela(true, nome);
            alert('✅ Site ativado com sucesso!');
        }

        async function desativarSite() {
            if(!verificarSenha()) return;
            const nome = document.getElementById('nomeAdm').value.trim() || 'Darkzin ADM';
            await refConfig.set({ ativo: false, nomeAdm: nome, ultimaAlteracao: firebase.firestore.FieldValue.serverTimestamp() });
            atualizarTela(false, nome);
            alert('❌ Site desativado! Ninguém poderá enviar sensibilidades.');
        }

        function verificarSenha() {
            const senha = document.getElementById('senhaAdm').value;
            if(senha !== SENHA_CORRETA) {
                alert('⚠️ Senha incorreta!');
                return false;
            }
            return true;
        }

        carregarStatus();
    </script>
</body>
</html>
